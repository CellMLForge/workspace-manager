name: Build Release Assets

on:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: build-release-assets-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build on ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            command: npx electron-builder --win nsis portable --publish never
            files: |
              dist/*.exe
              dist/*.blockmap
              dist/latest*.yml
          - label: macOS
            os: macos-latest
            command: npx electron-builder --mac zip dmg --publish never
            files: |
              dist/*.dmg
              dist/*-mac.zip
              dist/latest-mac.yml
          - label: Linux
            os: ubuntu-latest
            command: npx electron-builder --linux AppImage tar.gz --publish never
            files: |
              dist/*.AppImage
              dist/*.tar.gz
              dist/latest-linux.yml

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distributables
        run: |
          npm run dist:clean
          npm run prepare-icons
          npm run build-main
          npm run renderer-build
          ${{ matrix.command }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ matrix.files }}
          fail_on_unmatched_files: true
